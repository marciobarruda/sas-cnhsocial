<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNH Social Recife - Em Instantes</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        :root {
            --primary: #0046ad;
            --primary-light: #0061f2;
            --secondary: #ff9d00;
            --bg-dark: #f8fafc;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract Background Elements */
        .bg-blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, rgba(0, 70, 173, 0.1) 0%, rgba(0, 97, 242, 0.1) 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        .blob-1 { top: -100px; right: -100px; }
        .blob-2 { bottom: -100px; left: -100px; animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 100px) scale(1.2); }
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            text-align: center;
            z-index: 10;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            padding: 60px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 70, 173, 0.15);
            transition: transform 0.3s ease;
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .icon-box {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 15px 30px -5px rgba(0, 70, 173, 0.3);
            position: relative;
        }

        .icon-box i {
            font-size: 40px;
            color: white;
            animation: pulse-icon 2s infinite;
        }

        @keyframes pulse-icon {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        h1 {
            color: var(--text-dark);
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-light);
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .loader {
            display: inline-flex;
            gap: 8px;
            margin-bottom: 40px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.5s infinite ease-in-out;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
            40% { transform: translateY(-10px); opacity: 1; }
        }

        .btn-refresh {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            background: white;
            border: 2px solid #e2e8f0;
            color: var(--text-dark);
            text-decoration: none;
            border-radius: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-refresh:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .btn-refresh i {
            font-size: 14px;
        }

        .footer-logo {
            margin-top: 50px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .footer-logo:hover {
            opacity: 1;
        }

        .footer-logo img {
            height: 45px;
            filter: grayscale(100%);
            transition: filter 0.3s;
        }

        .footer-logo:hover img {
            filter: grayscale(0%);
        }

        @media (max-width: 480px) {
            .card { padding: 40px 24px; }
            h1 { font-size: 1.8rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="container">
        <div class="card animate__animated animate__fadeInUp">
            <div class="logo-container">
                <img src="https://cnhsocial.recife.pe.gov.br/wp-content/uploads/2025/12/CNH-Recife-Logo.png?v=2" alt="CNH Social Recife" style="height: 100px; width: auto; margin-bottom: 20px;">
            </div>
            <h1>Sistema em Preparação</h1>
            <p>O Programa CNH Social Recife está sendo preparado para você. Por favor, tente novamente em alguns instantes.</p>
            
            <div class="loader">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div>
                <button class="btn-refresh" onclick="location.reload()">
                    <i class="fas fa-sync-alt"></i> Tentar novamente
                </button>
            </div>
        </div>

    </div>
</body>
</html>
